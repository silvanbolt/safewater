name: Build Desktop Apps

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt pyinstaller
          # Uncomment after adding the real YOLO model:
          # pip install -r requirements-yolo.txt

      - name: Build macOS app
        run: |
          pyinstaller --clean --noconfirm packaging/pyinstaller/water_source_classifier.spec
          mkdir -p packaging/macos/dist-installer
          ditto -c -k --keepParent "dist/Water Source Classifier.app" "packaging/macos/dist-installer/WaterSourceClassifier-macOS.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaterSourceClassifier-macOS
          path: |
            dist/Water Source Classifier.app
            packaging/macos/dist-installer/WaterSourceClassifier-macOS.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt pyinstaller
          # Uncomment after adding the real YOLO model:
          # pip install -r requirements-yolo.txt

      - name: Build Windows app
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm packaging\pyinstaller\water_source_classifier.spec

      - name: Zip Windows app
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Water Source Classifier" -DestinationPath "WaterSourceClassifier-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaterSourceClassifier-Windows
          path: |
            WaterSourceClassifier-Windows.zip
            dist/Water Source Classifier
